<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="/logoSmallSombre.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/logoSmallClair.png"
      media="(prefers-color-scheme: light)"
    />
    <link rel="icon" type="image/png" href="/logoSmallSombre.png" />
    <link rel="apple-touch-icon" href="/logoSmallSombre.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="Anonymisez vos fichiers JSON en quelques clics, en toute confidentialité, directement dans votre navigateur."
    />
    <title>JSON Anonymizer 🕵️‍♂️ Anonymisez vos données en toute simplicité</title>
    <script>
      // Apply theme synchronously to avoid FOUC.
      (function () {
        try {
          var stored = localStorage.getItem('jsonanon:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
